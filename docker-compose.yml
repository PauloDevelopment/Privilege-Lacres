version: "3"

services:
  mysql57:
    image: mysql:8.0.29
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: privilege_management
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: flask_app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - mysql57

volumes:
  db_data: