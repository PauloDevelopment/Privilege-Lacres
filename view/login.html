<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Sistema</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <!-- CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

        <!-- JS -->
        <script src="{{ url_for('static', filename='js/login.js') }}" defer></script>
    </head>

    <body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100">

        <div class="card shadow-sm border-0 p-4" style="width: 420px;">

            <div class="text-center mb-4">
                <div class="mb-2">
                    <i class="fa-solid fa-shield-halved fa-2x text-dark"></i>
                </div>
                <h4 class="fw-bold mb-0">Privilege Lacres</h4>
                <small class="text-muted">Acesso ao Sistema</small>
            </div>

            <form id="login-form">

                <div class="mb-3">
                    <i class="fa-solid fa-envelope me-1"></i>
                    <label class="form-label small fw-bold">E-mail</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <div class="mb-3">
                    <i class="fa-solid fa-lock me-1"></i>
                    <label class="form-label small fw-bold">Senha</label>
                    <input type="password" class="form-control" id="password" required>
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    <i class="fa-solid fa-right-to-bracket me-1"></i>
                    Entrar
                </button>

            </form>

            <div class="text-center mt-3">
                <small id="login-message" class="text-danger"></small>
            </div>

        </div>

    </div>

    </body>
</html>
