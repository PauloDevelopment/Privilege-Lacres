<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">Pedidos</h3>
            <p class="text-muted small">Gerenciar pedidos cadastrados no sistema</p>
        </div>
        <button class="btn btn-dark px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalPedido" onclick="prepararNovoPedido()">
            <i class="bi bi-plus-lg me-2"></i> Novo Pedido
        </button>
    </div>

    <div class="card p-3">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Número do Pedido</th>
                    <th>Empresa</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th class="text-end">Valor Total</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-pedidos-corpo">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalPedido" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content border-0">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Informações do Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <div class="modal-body">
                <p class="text-muted small mb-4">Preencha os dados para cadastrar ou editar um pedido</p>
                
                <form id="formPedido">
                    <input type="hidden" id="pedido_id">

                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Empresa *</label>
                            <select class="form-select" id="id_empresa" required>
                                <option value="">Selecione uma empresa...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Número do Pedido *</label>
                            <input type="text" class="form-control" id="numero_pedido" placeholder="Ex: PED-2026-001" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Data do Pedido *</label>
                            <input type="date" class="form-control" id="data" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nota Fiscal (NF)</label>
                            <input type="text" class="form-control" id="nf" placeholder="Número da Nota">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Total da NF (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="total_nf" placeholder="0,00">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Data de Vencimento</label>
                            <input type="date" class="form-control" id="vencimento">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Data de Entrega</label>
                            <input type="date" class="form-control" id="data_entrega">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Status *</label>
                            <select class="form-select" id="status" required>
                                <option value="Pendente">Pendente</option>
                                <option value="Em Produção">Em Produção</option>
                                <option value="Concluído">Concluído</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 border-top pt-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="fw-bold mb-0">Produtos / Itens do Pedido</h6>
                            <button type="button" class="btn btn-sm btn-outline-primary" onclick="adicionarLinhaItem()">
                                <i class="bi bi-plus-circle me-1"></i> Adicionar Item
                            </button>
                        </div>
                        <div id="container-itens"></div>
                        <div class="d-flex justify-content-end mt-3 p-3 bg-dark text-white rounded shadow-sm">
                            <span class="me-3 opacity-75">Soma Total:</span>
                            <h4 id="valor-total-pedido" class="mb-0 fw-bold">R$ 0,00</h4>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-dark px-4" onclick="salvarPedidoCompleto()">Salvar Pedido</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/pedidos.js') }}"></script>
</html>
